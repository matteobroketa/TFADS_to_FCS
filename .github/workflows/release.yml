name: Build Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: TFADS_to_FCS-windows
            build_cmd: >-
              pyinstaller --noconfirm --clean --windowed --onefile --name TFADS_to_FCS
              --paths src
              --hidden-import tfads_to_fcs.gui
              --hidden-import PySide6.QtCore
              --hidden-import PySide6.QtGui
              --hidden-import PySide6.QtWidgets
              --add-data "Gemini_Generated_Image_72a67r72a67r72a6.png;."
              app.py
          - os: macos-latest
            artifact_name: TFADS_to_FCS-macos
            build_cmd: >-
              pyinstaller --noconfirm --clean --windowed --onefile --name TFADS_to_FCS
              --paths src
              --hidden-import tfads_to_fcs.gui
              --hidden-import PySide6.QtCore
              --hidden-import PySide6.QtGui
              --hidden-import PySide6.QtWidgets
              --add-data "Gemini_Generated_Image_72a67r72a67r72a6.png:."
              app.py
          - os: ubuntu-latest
            artifact_name: TFADS_to_FCS-linux
            build_cmd: >-
              pyinstaller --noconfirm --clean --windowed --onefile --name TFADS_to_FCS
              --paths src
              --hidden-import tfads_to_fcs.gui
              --hidden-import PySide6.QtCore
              --hidden-import PySide6.QtGui
              --hidden-import PySide6.QtWidgets
              --add-data "Gemini_Generated_Image_72a67r72a67r72a6.png:."
              app.py

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install . pyinstaller

      - name: Build binary
        run: ${{ matrix.build_cmd }}

      - name: Pack artifact (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: Compress-Archive -Path dist/TFADS_to_FCS.exe -DestinationPath ${{ matrix.artifact_name }}.zip -Force

      - name: Pack artifact (macOS/Linux)
        if: runner.os != 'Windows'
        run: zip -j ${{ matrix.artifact_name }}.zip dist/TFADS_to_FCS

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}.zip
